<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>결의대회 PPT</title>
 
  <link rel="stylesheet" href="swiper.css"/>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      background: #000;
    }

    .swiper {
      width: 100%;
      margin: 0 auto;
    }

    .swiper-slide {
      display: flex;
      justify-content: center;
      align-items: center;
      background: #000;
    }

    .swiper-slide img, video {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

  </style>
</head>
<body>
  <div class="swiper">
    <div class="swiper-wrapper">
      <div class="swiper-slide"><video src="1.mp4" muted></video></div>
      <div class="swiper-slide"><img src="2.jpg"></div>
      <div class="swiper-slide"><img src="3.jpg"></div>
      <div class="swiper-slide"><img src="4.jpg"></div>
      <div class="swiper-slide"><img src="5.jpg"></div>
      <div class="swiper-slide"><img src="6.jpg"></div>
      <div class="swiper-slide"><img src="7.jpg"></div>
      <div class="swiper-slide"><img src="8.jpg"></div>
      <div class="swiper-slide"><img src="9.jpg"></div>
      <div class="swiper-slide"><img src="10.jpg"></div>
      <div class="swiper-slide"><img src="11.jpg"></div>
      <div class="swiper-slide"><video src="12.mp4"></video></div>
      <div class="swiper-slide"><img src="13.jpg"></div>
      <div class="swiper-slide"><img src="14.jpg"></div>
      <div class="swiper-slide"><img src="15.jpg"></div>
    </div>
  </div>

  <!-- 로컬 Swiper JS -->
  <script src="swiper.js"></script>

<script>
  const swiper = new Swiper('.swiper', {
    slidesPerView: 1,
    effect: 'fade',
    fadeEffect: { crossFade: true },
    speed: 400,
    loop: false,
    allowTouchMove: false,
    keyboard: {
      enabled: true,
      onlyInViewport: false,
    },
    on: {
      click: function() {
        this.slideNext();
      },
      slideChange: function() {
        // 모든 비디오 정지 및 초기화
        document.querySelectorAll('.swiper-slide video').forEach(v => {
          v.pause();
          v.currentTime = 0;
        });

        // 현재 슬라이드에 비디오 있으면 조건에 따라 재생
        const currentSlide = this.slides[this.activeIndex];
        const video = currentSlide.querySelector('video');
        if (video) {
          video.play();

          if (this.activeIndex === 0) {
            video.loop = true;   // 1p → 무한 반복
          } else if (this.activeIndex === 11) {
            video.loop = false;  // 12p → 반복 없음
          } else {
            video.loop = false;  // 기본값
          }
        }
      }
    }
  });

  // 초기 로딩 시 첫 슬라이드가 영상이면 바로 재생
  window.addEventListener('load', () => {
    const firstSlide = swiper.slides[swiper.activeIndex];
    const firstVideo = firstSlide.querySelector('video');
    if (firstVideo) {
      firstVideo.play();
      firstVideo.loop = true; // 첫 페이지는 무한 반복
    }
  });
</script>
</body>
</html>
